name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # --- WINDOWS: Keeping it simple as requested ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build EXE via NSIS
        run: |
          choco install nsis -y
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 installer.nsi
      - name: Create Zip
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  # --- MAC: Switching to Flat Package (Bypassing distribution.xml errors) ---
  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Prepare macOS Scripts
        run: |
          mkdir -p scripts pkg_root
          # postinstall trigger for your repo's install.sh
          cat <<EOF > scripts/postinstall
          #!/bin/bash
          # Determine the directory where the package resources are extracted
          RESOURCE_DIR="\$2/Contents/Resources"
          /bin/bash "\$RESOURCE_DIR/install.sh"
          exit 0
          EOF
          chmod +x scripts/postinstall
          cp ./install.sh pkg_root/

      - name: Build User-Level PKG
        run: |
          brew install create-dmg
          
          # This command builds the installer WITHOUT a distribution.xml.
          # It packs everything directly into the final .pkg file.
          # This skips the 'pkg-ref' logic entirely, which fixed the error in image_1406ba.jpg.
          pkgbuild --root pkg_root \
                   --scripts scripts \
                   --identifier com.aurora.shell.installer \
                   --version "1.0.0" \
                   --install-location "/tmp/aurora-shell-install" \
                   "Install-Aurora.pkg"
          
          # Wrap the result in a DMG
          mkdir -p dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg