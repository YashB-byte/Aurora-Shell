name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # --- WINDOWS BUILD (Builds the .exe) ---
  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows EXE
        shell: pwsh
        run: |
          # Finds ANY .nsi file in your repo and builds it
          $nsiFile = Get-ChildItem -Recurse -Filter "*.nsi" | Select-Object -First 1
          if ($null -eq $nsiFile) {
            Write-Error "❌ No NSIS script found! Please add installer.nsi to your repo."
            exit 1
          }
          Write-Host "✅ Found: $($nsiFile.FullName)"
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 $($nsiFile.FullName)

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-windows-${{ github.ref_name }}
          path: ./*.exe

  # --- UNIX BUILD (Packages the .sh) ---
  unix-build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Package Scripts
        run: |
          mkdir -p dist
          # Finds ANY .sh file with 'install' in the name
          SCRIPT=$(find . -maxdepth 2 -iname "*install*.sh" | head -n 1)
          if [ -z "$SCRIPT" ]; then
            echo "❌ No install.sh found!"
            exit 1
          fi
          cp "$SCRIPT" dist/aurora-installer.sh
          chmod +x dist/aurora-installer.sh

      - name: Upload Unix Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-unix-${{ github.ref_name }}
          path: dist/aurora-installer.sh

  # --- RELEASE (Triggers on tags like v1.0.0) ---
  publish-release:
    needs: [windows-build, unix-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.exe
            **/*.sh
          body: |
            ## 🌈 Aurora-Shell Official Release
            Build generated from branch: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}