name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # --- WINDOWS BUILD ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build EXE via NSIS
        run: |
          choco install nsis -y
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 installer.nsi
      - name: Create Zip
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  # --- MAC BUILD (The Failsafe Method) ---
  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare macOS Scripts
        run: |
          mkdir -p scripts pkg_root
          cat <<EOF > scripts/postinstall
          #!/bin/bash
          RESOURCE_DIR="\$2/Contents/Resources"
          /bin/bash "\$RESOURCE_DIR/install.sh"
          exit 0
          EOF
          chmod +x scripts/postinstall
          cp ./install.sh pkg_root/
      - name: Build User-Level PKG
        run: |
          brew install create-dmg
          pkgbuild --root pkg_root \
                   --scripts scripts \
                   --identifier com.aurora.shell.installer \
                   --version "1.0.0" \
                   --install-location "/tmp/aurora-shell-install" \
                   "Install-Aurora.pkg"
          mkdir -p dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg

  # --- PUBLISH RELEASE (Requires Approval) ---
  publish-release:
    needs: [windows-build, unix-build]
    # Only runs on Tags (v1.0.0, etc.) or manual trigger
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: 'Production' # This triggers the "Approval" requirement in GitHub
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.dmg
          body: "## 🌈 Aurora-Shell Release [${{ github.ref_name }}]\n\nRelease generated from Build #${{ github.run_number }}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}