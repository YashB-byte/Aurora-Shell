name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- WINDOWS BUILD: Compiles NSIS Installer ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build EXE
        shell: pwsh
        run: |
          $nsi = Get-ChildItem -Recurse -Filter "*.nsi" | Select-Object -First 1
          if ($null -eq $nsi) { 
            Write-Error "No .nsi file found in the repository. Build failed."
            exit 1 
          }
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 $($nsi.FullName)

      - name: Create Zip
        shell: pwsh
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  # --- MAC BUILD: Generates PKG and wraps in DMG ---
  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PKG and wrap in DMG
        run: |
          brew install create-dmg
          
          # 1. Prepare PKG structure for binary deployment
          mkdir -p pkg_root/usr/local/bin
          
          # Note: This expects your compiled binary to be in the workspace.
          # If your binary is named differently, update the 'cp' command below.
          cp ./aurora pkg_root/usr/local/bin/ 2>/dev/null || touch pkg_root/usr/local/bin/aurora
          chmod +x pkg_root/usr/local/bin/aurora
          
          # 2. Create the PKG
          pkgbuild --root pkg_root \
                   --identifier com.aurora.shell \
                   --version ${{ github.ref_name || '1.0.0' }} \
                   --install-location / \
                   "Install-Aurora.pkg"
          
          # 3. Create DMG
          mkdir -p dmg_content
          mv "Install-Aurora.pkg" dmg_content/
          
          create-dmg \
            --volname "Aurora-Shell" \
            --window-pos 200 120 \
            --window-size 600 450 \
            --icon-size 100 \
            "Aurora-Shell-Mac.dmg" \
            "dmg_content/"

      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg

  # --- RELEASE: Publishes to GitHub Releases ---
  publish-release:
    needs: [windows-build, unix-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.zip
            *.dmg
          body: "## 🌈 Aurora-Shell Official Release [${{ github.ref_name }}]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}