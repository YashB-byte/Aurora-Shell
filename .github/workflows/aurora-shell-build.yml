name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- WINDOWS BUILD ---
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build EXE
        shell: pwsh
        run: |
          $nsi = Get-ChildItem -Recurse -Filter "*.nsi" | Select-Object -First 1
          if ($null -eq $nsi) { exit 1 }
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V3 $($nsi.FullName)
      - name: Create Zip
        shell: pwsh
        run: Compress-Archive -Path ./*.exe -DestinationPath ./Aurora-Shell-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./Aurora-Shell-Windows.zip

  # --- MAC BUILD: Script Chain Execution ---
  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Scripts for PKG
        run: |
          # 1. Create the scripts directory for pkgbuild
          mkdir -p scripts
          
          # 2. Setup the chain: postinstall (installer.sh) -> install.sh
          # We rename your installer.sh to 'postinstall' so Apple's Installer triggers it automatically.
          cp ./installer.sh scripts/postinstall
          cp ./install.sh scripts/install.sh
          chmod +x scripts/postinstall scripts/install.sh

          # 3. Create a dummy root (PKG needs a root folder even if empty)
          mkdir -p pkg_root

      - name: Build PKG and wrap in DMG
        run: |
          brew install create-dmg
          
          # Build the PKG including the scripts folder
          pkgbuild --root pkg_root \
                   --scripts scripts \
                   --identifier com.aurora.shell \
                   --version ${{ github.ref_name || '1.0.0' }} \
                   --install-location /tmp/aurora-temp \
                   "Install-Aurora.pkg"
          
          mkdir -p dmg_content
          mv "Install-Aurora.pkg" dmg_content/
          
          create-dmg \
            --volname "Aurora-Shell" \
            --window-pos 200 120 \
            --window-size 600 450 \
            --icon-size 100 \
            "Aurora-Shell-Mac.dmg" \
            "dmg_content/"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg

  # --- RELEASE ---
  publish-release:
    needs: [windows-build, unix-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.zip
            *.dmg
          body: "## 🌈 Aurora-Shell Official Release [${{ github.ref_name }}]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}