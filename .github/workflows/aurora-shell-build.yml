name: Aurora-Shell CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build EXE
        run: |
          choco install nsis -y
          makensis /V3 installer.nsi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-pkg
          path: ./*.exe

  unix-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Flat Package
        run: |
          mkdir -p scripts pkg_root
          cat <<EOF > scripts/postinstall
          #!/bin/bash
          /bin/bash "\$2/Contents/Resources/install.sh"
          exit 0
          EOF
          chmod +x scripts/postinstall
          cp ./install.sh pkg_root/
          pkgbuild --root pkg_root --scripts scripts --identifier com.aurora.shell --version "5.3" --install-location "/tmp/aurora-payload" "Install-Aurora.pkg"
          brew install create-dmg
          mkdir dmg_content && mv "Install-Aurora.pkg" dmg_content/
          create-dmg --volname "Aurora-Shell" "Aurora-Shell-Mac.dmg" "dmg_content/"
      - uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: ./*.dmg

  publish-release:
    needs: [windows-build, unix-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: 'Production' # Approval Gate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Changelog
        id: changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          [ -z "$PREV" ] && LOG=$(git log --oneline -n 10) || LOG=$(git log ${PREV}..HEAD --oneline)
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.exe
            *.dmg
          body: |
            ## 🌈 Aurora-Shell v5.3
            ### 📝 Changes
            ${{ steps.changelog.outputs.log }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}