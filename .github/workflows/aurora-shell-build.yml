name: Aurora Release Build
permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS Installer
        run: |
          mkdir -p build/scripts
          cp install.sh build/scripts/postinstall
          chmod +x build/scripts/postinstall
          pkgbuild --scripts build/scripts --identifier com.yashb.aurora --install-location "$HOME/.aurora-shell" --nopayload build/component.pkg

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build Windows EXE
        shell: pwsh
        run: |
          # The critical fix for your previous error
          $env:Path += ";C:\Program Files (x86)\NSIS"
          makensis installer.nsi

  publish-release:
    needs: [macos-build, windows-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.5.8
          name: aurora-shell v4.5.8
          draft: false
          prerelease: false
